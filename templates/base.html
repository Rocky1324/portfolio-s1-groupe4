<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Innovations Scientifiques - S1 Groupe 4{% endblock %}</title>
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <!-- FontAwesome pour les icones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <!-- Three.js CDN pour les modèles 3D -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <!-- Chart.js CDN pour les graphiques -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    {% block head %}{% endblock %}
</head>
<body>
    <div class="glass-background"></div>
    
    <nav class="navbar">
        <div class="logo">
            <a href="{{ url_for('index') }}">
                <span class="gradient-text">Groupe 4</span> S1
            </a>
        </div>
        <ul class="nav-links">
            <li><a href="{{ url_for('physique') }}"><i class="fa-solid fa-flask"></i> Physique</a></li>
            <li><a href="{{ url_for('chimie') }}"><i class="fa-solid fa-atom"></i> Chimie</a></li>
            <li><a href="{{ url_for('svt') }}"><i class="fa-solid fa-leaf"></i> SVT</a></li>
            <li><a href="{{ url_for('sismologie') }}"><i class="fa-solid fa-house-crack"></i> Sismologie</a></li>
        </ul>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 Classe S1 - Groupe 4. Tous droits réservés.</p>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
