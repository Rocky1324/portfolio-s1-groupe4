<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Innovations Scientifiques - S1 Groupe 4{% endblock %}</title>
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <!-- FontAwesome pour les icones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <!-- Three.js CDN pour les modèles 3D -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <!-- Chart.js CDN pour les graphiques -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    {% block head %}{% endblock %}
</head>
<body>
    <div class="glass-background"></div>
    
    <nav class="navbar">
        <div class="logo">
            <a href="{{ url_for('index') }}">
                <span class="gradient-text">Groupe 4</span> S1
            </a>
        </div>
        <ul class="nav-links">
            <li><a href="{{ url_for('physique') }}"><i class="fa-solid fa-flask"></i> Physique</a></li>
            <li><a href="{{ url_for('chimie') }}"><i class="fa-solid fa-atom"></i> Chimie</a></li>
            <li><a href="{{ url_for('svt') }}"><i class="fa-solid fa-leaf"></i> SVT</a></li>
            <li><a href="{{ url_for('sismologie') }}"><i class="fa-solid fa-house-crack"></i> Sismologie</a></li>
        </ul>
        <div class="lang-selector" style="margin-left: 20px;">
            <select id="lang-switch" onchange="changeLanguage(this.value)" style="background: rgba(255,255,255,0.1); color: var(--text-primary); border: 1px solid rgba(255,255,255,0.2); border-radius: 5px; padding: 8px; outline: none; cursor: pointer; font-family: 'Inter', sans-serif;">
                <option value="fr" style="color: black;">🇫🇷 Français</option>
                <option value="en" style="color: black;">🇺🇸 English</option>
                <option value="ht" style="color: black;">🇭🇹 Kreyòl</option>
            </select>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 Classe S1 - Groupe 4. Tous droits réservés.</p>
    </footer>

    <!-- Google Translate Element (Hidden) -->
    <div id="google_translate_element" style="display: none;"></div>
    
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'fr', 
                includedLanguages: 'en,fr,ht',
                autoDisplay: false
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    
    <script>
        // Custom Language Switcher Logic
        function changeLanguage(lang) {
            var selectField = document.querySelector("#google_translate_element select");
            if (!selectField) {
                // If translate element not loaded yet, retry shortly
                setTimeout(function() { changeLanguage(lang); }, 500);
                return;
            }
            
            for(var i=0; i < selectField.children.length; i++) {
                if(selectField.children[i].value == lang) {
                    selectField.selectedIndex = i;
                    selectField.dispatchEvent(new Event('change'));
                    break;
                }
            }
        }

        // Restore custom dropdown value based on active translation
        window.addEventListener('load', function() {
            setTimeout(function() {
                var selectField = document.querySelector("#google_translate_element select");
                var customSwitch = document.getElementById("lang-switch");
                if (selectField && selectField.value) {
                    customSwitch.value = selectField.value;
                } else {
                    // Check cookie if value is empty
                    var match = document.cookie.match(/googtrans=\/fr\/([a-z]{2})/);
                    if (match && match[1]) {
                        customSwitch.value = match[1];
                    }
                }
            }, 1000);
        });
    </script>

    <!-- Hide Google Translate Banner -->
    <style>
        body { top: 0 !important; }
        .skiptranslate > iframe { display: none !important; }
        .VIpgJd-ZVi9od-ORHb-OEVmcd { display: none !important; } /* Additional banner hide */
    </style>

    {% block scripts %}{% endblock %}
</body>
</html>
